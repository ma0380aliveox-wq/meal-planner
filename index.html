<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族のレシピ＆献立帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f4; --surface:#fff; --surface2:#f5f0e8; --border:#e2d9cc;
  --text:#2c2416; --text2:#8a7d6e; --accent:#c17f3e; --accent2:#8b5a1e;
  --accent-light:#fdf3e7; --fav:#d4566a; --green:#5a8a5e; --green-light:#eef5ee;
  --blue:#4a7fa5; --blue-light:#eaf2f8;
  --shadow:0 2px 16px rgba(44,36,22,.08); --shadow-lg:0 6px 32px rgba(44,36,22,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(44,36,22,.07);}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 0;}
.logo{font-family:'Shippori Mincho',serif;font-size:20px;color:var(--accent2);letter-spacing:.12em;}
.logo span{color:var(--accent);}
.header-btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:6px;font-family:inherit;font-size:13px;cursor:pointer;transition:background .2s;}
.header-btn:hover{background:var(--accent2);}

/* TABS */
.tabs{display:flex;margin-top:12px;}
.tab{padding:10px 26px;border:none;background:transparent;font-family:'Shippori Mincho',serif;font-size:15px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.06em;}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab:hover{color:var(--accent);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;margin-left:6px;font-family:'Noto Serif JP',serif;}

/* PAGES */
.page{display:none;max-width:1100px;margin:0 auto;padding:24px 20px;}
.page.active{display:block;}

/* BUTTONS */
.btn-primary{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:8px 16px;border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{background:var(--accent);color:#fff;}
.btn-green{background:var(--green);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;transition:background .2s;}
.btn-green:hover{background:#3d6e42;}
.btn-ai{background:linear-gradient(135deg,var(--accent),var(--green));color:#fff;border:none;padding:10px 22px;border-radius:8px;font-family:inherit;font-size:14px;cursor:pointer;transition:opacity .2s;display:inline-flex;align-items:center;gap:7px;font-weight:600;}
.btn-ai:hover{opacity:.88;}
.btn-ai:disabled{opacity:.45;cursor:not-allowed;}

/* FORMS */
.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;letter-spacing:.04em;}
input[type=text],textarea,select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);transition:border-color .2s;resize:vertical;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}

/* ── RECIPE TAB ── */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);transition:border-color .2s;}
.search-wrap input:focus{outline:none;border-color:var(--accent);}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;}
.tag-filters{display:flex;flex-wrap:wrap;gap:6px;}
.tag-chip{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;transition:all .18s;font-family:inherit;color:var(--text2);}
.tag-chip:hover,.tag-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fav-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;padding:5px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;transition:all .18s;}
.fav-toggle:hover,.fav-toggle.active{border-color:var(--fav);color:var(--fav);background:#fff5f7;}
.count-info{font-size:12px;color:var(--text2);margin-bottom:14px;}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
.recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;cursor:pointer;}
.recipe-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.card-header{background:var(--surface2);padding:14px 16px 11px;border-bottom:1px solid var(--border);position:relative;}
.card-title{font-family:'Shippori Mincho',serif;font-size:16px;color:var(--text);margin-bottom:7px;line-height:1.4;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.card-tag{font-size:11px;padding:2px 8px;background:#ede8df;border-radius:12px;color:var(--text2);}
.ai-badge{font-size:10px;padding:2px 7px;background:var(--blue-light);color:var(--blue);border-radius:10px;border:1px solid #b8d4e8;margin-left:5px;vertical-align:middle;}
.fav-btn{position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;line-height:1;transition:transform .15s;color:#ccc;}
.fav-btn.active{color:var(--fav);}
.fav-btn:hover{transform:scale(1.2);}
.card-body{padding:12px 16px;}
.card-ingredients{font-size:12px;color:var(--text2);line-height:1.7;}
.card-ingredients strong{color:var(--text);font-size:11px;display:block;margin-bottom:3px;}
.card-meta{margin-top:10px;padding-top:9px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-date{font-size:11px;color:var(--text2);}
.card-actions{display:flex;gap:6px;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);padding:2px;transition:color .15s;}
.icon-btn:hover{color:var(--accent);}
.icon-btn.danger:hover{color:var(--fav);}
.memo-badge{display:inline-block;background:var(--green-light);color:var(--green);font-size:10px;padding:2px 7px;border-radius:10px;margin-left:5px;vertical-align:middle;border:1px solid #c4ddc6;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2);grid-column:1/-1;}
.empty-state .icon{font-size:42px;margin-bottom:12px;}

/* ── MEAL TAB ── */
/* AI Generation Panel */
.ai-gen-panel{background:linear-gradient(135deg,#fffdf7 0%,#f4faf4 100%);border:1.5px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:24px;}
.ai-gen-title{font-family:'Shippori Mincho',serif;font-size:17px;color:var(--accent2);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.ai-gen-subtitle{font-size:12px;color:var(--text2);margin-bottom:18px;}

/* Ingredient input */
.ingredients-input-area{margin-bottom:18px;}
.ing-title{font-size:13px;color:var(--text);font-weight:600;margin-bottom:8px;}
.ing-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;min-height:36px;padding:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;}
.ing-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);border:1px solid #f0d8bb;border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text);}
.ing-chip-del{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);line-height:1;padding:0;}
.ing-chip-del:hover{color:var(--fav);}
.ing-add-row{display:flex;gap:8px;}
.ing-add-row input{flex:1;}
.ing-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.ing-sug-chip{padding:3px 10px;border-radius:16px;border:1px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:inherit;}
.ing-sug-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.btn-edit-sug{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-edit-sug:hover{border-color:var(--accent);color:var(--accent);}
.sug-editor-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:14px;}
.sug-editor-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;}
.sug-editor-name{font-size:13px;color:var(--text);}
.sug-editor-del{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text2);}
.sug-editor-del:hover{color:var(--fav);}

.ai-gen-footer{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.ai-cost-note{font-size:11px;color:var(--text2);}

/* Loading */
.ai-loading{display:none;text-align:center;padding:28px;color:var(--text2);font-size:13px;}
.ai-loading .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* AI Result Preview */
.ai-result{display:none;margin-top:20px;border-top:1px solid var(--border);padding-top:20px;}
.ai-result-title{font-family:'Shippori Mincho',serif;font-size:15px;color:var(--accent2);margin-bottom:14px;}
.ai-week-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.ai-day-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ai-day-head{background:var(--surface2);padding:7px 10px;text-align:center;border-bottom:1px solid var(--border);}
.ai-day-name{font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent2);}
.ai-day-body{padding:10px;}
.ai-dish-name{font-size:12px;color:var(--text);font-weight:600;margin-bottom:5px;line-height:1.4;}
.ai-dish-ing{font-size:11px;color:var(--text2);line-height:1.6;}

.ai-nutrition{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.ai-nutrition-title{font-size:12px;color:var(--text2);margin-bottom:10px;}
.nut-bars{display:flex;flex-direction:column;gap:7px;}
.nut-row{display:flex;align-items:center;gap:8px;}
.nut-label{font-size:11px;color:var(--text2);width:55px;flex-shrink:0;}
.nut-track{flex:1;height:8px;background:#ede8df;border-radius:4px;overflow:hidden;}
.nut-fill{height:100%;border-radius:4px;transition:width .7s ease;}
.nut-val{font-size:11px;color:var(--text2);width:34px;text-align:right;flex-shrink:0;}

.ai-comment-box{background:var(--green-light);border:1px solid #c4ddc6;border-radius:9px;padding:12px 16px;font-size:13px;color:var(--text);line-height:1.7;margin-bottom:16px;}
.ai-result-actions{display:flex;justify-content:flex-end;gap:10px;}

/* Week Calendar */
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.week-label{font-family:'Shippori Mincho',serif;font-size:16px;color:var(--accent2);}
.nav-btn{background:var(--surface);border:1.5px solid var(--border);padding:6px 14px;border-radius:7px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--text2);transition:all .18s;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.day-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.day-col.today{border-color:var(--accent);}
.day-head{background:var(--surface2);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);}
.day-col.today .day-head{background:var(--accent-light);}
.day-name{font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent2);}
.day-date{font-size:10px;color:var(--text2);margin-top:2px;}
.day-meals{padding:8px;min-height:100px;display:flex;flex-direction:column;gap:6px;}
.meal-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;cursor:pointer;transition:all .15s;}
.meal-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(193,127,62,.12);}
.meal-item-name{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:4px;}
.meal-item-foot{display:flex;justify-content:space-between;align-items:center;}
.meal-ai-dot{width:7px;height:7px;background:var(--blue);border-radius:50%;display:inline-block;}
.meal-memo-dot{font-size:10px;color:var(--green);}
.meal-del{background:none;border:none;font-size:12px;cursor:pointer;color:var(--text2);}
.meal-del:hover{color:var(--fav);}
.meal-add-btn{background:none;border:1px dashed var(--border);border-radius:7px;padding:6px;font-size:12px;color:var(--text2);cursor:pointer;text-align:center;transition:all .18s;font-family:inherit;width:100%;}
.meal-add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .22s ease;}
.modal.wide{max-width:640px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:17px;color:var(--accent2);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);}
.modal-body{padding:18px 22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

.preset-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px;}
.preset-tag{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--text2);transition:all .15s;}
.preset-tag.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.custom-tag-wrap{display:flex;gap:7px;}
.custom-tag-wrap input{flex:1;}
.tag-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.tag-item{background:#ede8df;border-radius:12px;padding:2px 9px;font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text);}
.tag-remove{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;color:var(--text2);padding:0;}

.detail-section{margin-bottom:18px;}
.detail-section h3{font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent2);border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:8px;letter-spacing:.06em;}
.detail-section p{font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;}

.recipe-picker{max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;}
.recipe-pick-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center;}
.recipe-pick-item:last-child{border-bottom:none;}
.recipe-pick-item:hover{background:var(--accent-light);}
.recipe-pick-name{font-size:13px;color:var(--text);}
.recipe-pick-tags{display:flex;gap:4px;}
.recipe-pick-tag{font-size:10px;padding:1px 7px;background:#ede8df;border-radius:10px;color:var(--text2);}

.memo-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;}
.memo-item{background:var(--green-light);border:1px solid #c4ddc6;border-radius:8px;padding:10px 13px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.memo-text{font-size:13px;color:var(--text);line-height:1.6;flex:1;}
.memo-meta{font-size:11px;color:var(--text2);margin-top:4px;}
.memo-del{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text2);flex-shrink:0;}
.memo-del:hover{color:var(--fav);}
.no-memo{font-size:13px;color:var(--text2);text-align:center;padding:18px;}

/* AI recipe detail */
.ai-recipe-box{background:var(--blue-light);border:1px solid #b8d4e8;border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.ai-recipe-box h4{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--blue);margin-bottom:10px;}
.steps-list{list-style:none;counter-reset:step;}
.steps-list li{counter-increment:step;display:flex;gap:10px;margin-bottom:8px;font-size:13px;line-height:1.7;}
.steps-list li::before{content:counter(step);background:var(--blue);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;}

@media(max-width:700px){
  .week-grid,.ai-week-cards{grid-template-columns:1fr 1fr;}
  .tab{padding:9px 14px;font-size:13px;}
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">家族の<span>レシピ＆献立帳</span></div>
    <button class="header-btn" id="mainAddBtn" onclick="handleAddBtn()">＋ レシピ追加</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('recipe')">📖 レシピ帳 <span class="tab-badge" id="recipeCount">0</span></button>
    <button class="tab" onclick="switchTab('meal')">🗓 今週の献立 <span class="tab-badge" id="mealCount">0</span></button>
  </div>
</header>

<!-- ═══ RECIPE PAGE ═══ -->
<div class="page active" id="page-recipe">
  <div class="filter-bar">
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="材料名で検索…" oninput="renderRecipes()">
    </div>
    <div class="tag-filters" id="tagFilters"></div>
    <button class="fav-toggle" id="favToggle" onclick="toggleFavFilter()">♥ お気に入り</button>
  </div>
  <div class="count-info" id="recipeCountInfo"></div>
  <div class="recipe-grid" id="recipeGrid"></div>
</div>

<!-- ═══ MEAL PAGE ═══ -->
<div class="page" id="page-meal">

  <!-- AI Generation Panel -->
  <div class="ai-gen-panel">
    <div class="ai-gen-title">🤖 AI週間献立を自動作成</div>
    <div class="ai-gen-subtitle">週末に買ってきた材料を入力すると、月〜金の夕食（4人家族・幼児2名）を提案します</div>

    <div class="ingredients-input-area">
      <div class="ing-title">📦 今週の食材</div>
      <div class="ing-chips" id="ingChips"><span style="font-size:12px;color:var(--text2);align-self:center">↓ 以下から追加、または直接入力</span></div>
      <div class="ing-add-row">
        <input type="text" id="ingInput" placeholder="食材名を入力（例：鶏もも肉）" onkeydown="if(event.key==='Enter'){addIngredient();event.preventDefault();}">
        <button class="btn-green" onclick="addIngredient()">追加</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;margin-bottom:5px;">
        <span style="font-size:11px;color:var(--text2)">よく使う食材（タップで追加）</span>
        <button class="btn-edit-sug" onclick="openSuggestionsEditor()">⚙️ カスタマイズ</button>
      </div>
      <div class="ing-suggestions" id="ingSuggestions"></div>
    </div>

    <div class="ai-gen-footer">
      <button class="btn-ai" id="aiGenBtn" onclick="generateMeals()">✨ 献立を生成する（AI 1回）</button>
      <span class="ai-cost-note">💡 1週間分を1回のAI呼び出しで生成します</span>
    </div>

    <div class="ai-loading" id="aiLoading">
      <div class="spinner"></div>
      AIが栄養バランスと幼児向けを考慮しながら5日分の献立＋レシピを生成中…
    </div>

    <div class="ai-result" id="aiResult">
      <div class="ai-result-title">✅ 提案された献立</div>
      <div class="ai-week-cards" id="aiWeekCards"></div>

// ═══════════════════════════════════════════
// AI MEAL GENERATION (1 API call for 5 days + recipes)
// ═══════════════════════════════════════════
async function generateMeals() {
  if(!ingredients.length) { alert('食材を1つ以上入力してください'); return; }

  document.getElementById('aiGenBtn').disabled = true;
  document.getElementById('aiLoading').style.display = 'block';
  document.getElementById('aiResult').style.display = 'none';

  const existingRecipes = recipes.slice(0,20).map(r=>r.name).join('、');
  const prompt = `あなたは管理栄養士です。以下の条件で月曜〜金曜の夕食献立を5日分提案してください。

【条件】
・家族構成：大人2名、幼児2名（3歳・5歳程度）
・今週の食材：${ingredients.join('、')}
・幼児が食べやすい味付け・食材サイズを意識
・栄養バランス（主食・主菜・副菜）を考慮
・同じ食材・ジャンルが連続しないよう工夫
${existingRecipes ? `・既存レシピ（使えそうなら活用）：${existingRecipes}` : ''}

以下のJSON形式のみで返答（前後の説明・マークダウン不要）：
{
  "days": [
    {
      "day": "月",
      "name": "料理名",
      "ingredients": "主な材料（短く）",
      "steps": ["手順1","手順2","手順3"],
      "tags": ["和食","主菜"],
      "childNote": "幼児向けのポイント（20字以内）"
    }
  ],
  "nutrition": { "carb": 80, "protein": 75, "vegetable": 70, "balance": 76 },
  "comment": "今週の献立についてのコメント（80字以内）"
}
daysは月〜金の5要素。nutritionは0〜100の達成度スコア。stepsは3〜5ステップ。`;

  const apiKey = checkApiKey();
  if (!apiKey) {
    document.getElementById('aiLoading').style.display = 'none';
    document.getElementById('aiGenBtn').disabled = false;
    return;
  }
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:prompt}]})
    });
    const data = await resp.json();
    if(!resp.ok){
      if(resp.status===401){ localStorage.removeItem('anthropic_api_key'); }
      alert('APIエラー: ' + (data.error?.message || resp.status));
      return;
    }
    const raw = (data.content||[]).map(b=>b.text||'').join('');
    const cleaned = raw.replace(/```json|```/g,'').trim();
    aiProposal = JSON.parse(cleaned);
    renderAIResult(aiProposal);
  } catch(e) {
    console.error('AI error:', e);
    alert('AI生成に失敗しました。もう一度お試しください。');
  } finally {
    document.getElementById('aiLoading').style.display = 'none';
    document.getElementById('aiGenBtn').disabled = false;
  }
}

function renderAIResult(proposal) {
  // Week cards
  document.getElementById('aiWeekCards').innerHTML = proposal.days.map(d => `
    <div class="ai-day-card">
      <div class="ai-day-head"><div class="ai-day-name">${d.day}</div></div>
      <div class="ai-day-body">
        <div class="ai-dish-name">${esc(d.name)}</div>
        <div class="ai-dish-ing">${esc(d.ingredients)}</div>
        ${d.childNote ? `<div style="font-size:10px;color:var(--green);margin-top:5px">👶 ${esc(d.childNote)}</div>` : ''}
      </div>
    </div>`).join('');

  // Nutrition
  const n = proposal.nutrition;
  const bars = [{label:'炭水化物',val:n.carb,color:'#e8a84c'},{label:'たんぱく質',val:n.protein,color:'#5a8a5e'},{label:'野菜',val:n.vegetable,color:'#6da56d'},{label:'総合',val:n.balance,color:'#c17f3e'}];
  document.getElementById('aiNutrition').innerHTML = `
    <div class="ai-nutrition-title">📊 栄養バランス評価</div>
    <div class="nut-bars">${bars.map(b=>`
      <div class="nut-row">
        <span class="nut-label">${b.label}</span>
        <div class="nut-track"><div class="nut-fill" style="width:${b.val}%;background:${b.color}"></div></div>
        <span class="nut-val">${b.val}%</span>
      </div>`).join('')}
    </div>`;

  document.getElementById('aiComment').textContent = '💬 ' + (proposal.comment||'');
  document.getElementById('aiResult').style.display = 'block';
}

async function applyAIMeals() {
  if(!aiProposal) return;
  if(!confirm('今週の献立に反映し、レシピをレシピ帳に保存しますか？')) return;

  const dates = getWeekDates(currentWeekOffset);
  const dayIdx = {'月':0,'火':1,'水':2,'木':3,'金':4};
  const today = new Date();
  const date = `${today.getFullYear()}/${pad(today.getMonth()+1)}/${pad(today.getDate())}`;

  for(const d of aiProposal.days) {
    const idx = dayIdx[d.day];
    if(idx === undefined) continue;

    // Save recipe to recipe book (avoid duplicate by name)
    let existingRecipe = recipes.find(r => r.name === d.name);
    if(!existingRecipe) {
      existingRecipe = {
        id: 'ai-' + Date.now() + '-' + Math.random().toString(36).slice(2),
        name: d.name,
        ingredients: d.ingredients,
        steps: Array.isArray(d.steps) ? d.steps.join('\n') : d.steps,
        tags: d.tags || [],
        favorite: false,
        aiGenerated: true,
        date
      };
      recipes.unshift(existingRecipe);
    }

    // Add to meal calendar
    const dk = dateKey(dates[idx]);
    if(!meals[dk]) meals[dk] = [];
    // avoid duplicate
    if(!meals[dk].find(m=>m.name===d.name)) {
      meals[dk].push({
        id: Date.now().toString() + Math.random().toString(36).slice(2),
        name: d.name,
        recipeId: existingRecipe.id,
        aiGenerated: true,
        memos: []
      });
    }
  }

  await saveRecipesData();
  await saveMealsData();
  dismissAI();
  renderAll();
  alert('献立を反映し、レシピを保存しました！');
}

function dismissAI() {
  document.getElementById('aiResult').style.display = 'none';
  aiProposal = null;
}

// ═══════════════════════════════════════════
// WEEK CALENDAR
// ═══════════════════════════════════════════
function getWeekDates(offset=0) {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow===0?6:dow-1) + offset*7);
  // only Mon-Fri (5 days)
  return Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function renderWeek() {
  const dates = getWeekDates(currentWeekOffset);
  const first = dates[0], last = dates[4];
  document.getElementById('weekLabel').textContent =
    `${first.getFullYear()}年${first.getMonth()+1}月${first.getDate()}日（月）〜 ${last.getMonth()+1}月${last.getDate()}日（金）`;
  const todayKey = getTodayKey();
  document.getElementById('weekGrid').innerHTML = dates.map((d,i) => {
    const dk = dateKey(d);
    const dayMeals = meals[dk] || [];
    return `<div class="day-col ${dk===todayKey?'today':''}">
      <div class="day-head">
        <div class="day-name">${WEEKDAYS[i]}</div>
        <div class="day-date">${d.getMonth()+1}/${d.getDate()}</div>
      </div>
      <div class="day-meals">
        ${dayMeals.map(m=>`
          <div class="meal-item" onclick="openMealDetail('${dk}','${m.id}')">
            <div class="meal-item-name">${esc(m.name)}</div>
            <div class="meal-item-foot">
              <span>${m.aiGenerated?'<span class="meal-ai-dot" title="AI生成"></span>':''} ${m.memos&&m.memos.length?'<span class="meal-memo-dot">📝</span>':''}</span>
              <button class="meal-del" onclick="event.stopPropagation();deleteMeal('${dk}','${m.id}')">✕</button>
            </div>
          </div>`).join('')}
        <button class="meal-add-btn" onclick="startAddMeal('${dk}')">＋</button>
      </div>
    </div>`;
  }).join('');
}
function changeWeek(dir) {
  if(dir===0) currentWeekOffset=0; else currentWeekOffset+=dir;
  renderWeek();
}
function startAddMeal(dk) { mealTargetDateKey=dk; openMealAddModal(); }

      </div>`).join('')

}
function selectMealRecipe(id, name) {

async function saveManualMeal() {
  const name = document.getElementById('mealFreeInput').value.trim();

  const recipeId = document.getElementById('mealFreeInput').dataset.recipeId || null;

  await saveMealsData();
  closeModal('mealAddModal');
  renderWeek(); updateBadges();
}
async function deleteMeal(dk, itemId) {
  if(!confirm('この献立を削除しますか？')) return;
  meals[dk]=(meals[dk]||[]).filter(m=>m.id!==itemId);
  if(!meals[dk].length) delete meals[dk];
  await saveMealsData(); renderWeek(); updateBadges();
}

// Meal detail + memo
function openMealDetail(dk, itemId) {
  const item=(meals[dk]||[]).find(m=>m.id===itemId); if(!item) return;
  activeMealItem={dateKey:dk,itemId};
  document.getElementById('mealDetailTitle').textContent = item.name;
  const r = item.recipeId ? recipes.find(x=>x.id===item.recipeId) : null;

  let recipeHtml = '';
  if(r) {
    const stepsHtml = r.steps
      ? `<ol class="steps-list">${r.steps.split('\n').filter(s=>s.trim()).map(s=>`<li>${esc(s.replace(/^[①-⑩\d]+[\.、．]?\s*/,''))}</li>`).join('')}</ol>`
      : '';
    recipeHtml = `<div class="ai-recipe-box">
      <h4>📖 ${esc(r.name)}${r.aiGenerated?'<span class="ai-badge">AI生成</span>':''}</h4>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px"><strong>材料：</strong>${esc(r.ingredients)}</div>
      ${stepsHtml}
      <div style="margin-top:10px"><button class="btn-secondary" style="font-size:12px;padding:5px 12px" onclick="closeModal('mealDetailModal');openDetail('${r.id}')">レシピ帳で見る →</button></div>
    </div>`;
  } else {
    recipeHtml = `<div style="font-size:12px;color:var(--text2);margin-bottom:12px">（レシピ帳未登録）</div>`;
  }
  document.getElementById('mealDetailRecipeInfo').innerHTML = recipeHtml;
  document.getElementById('mealMemoInput').value = '';
  renderMemoList(item);
  openModal('mealDetailModal');
}
function renderMemoList(item) {
  const memos = item.memos||[];
  document.getElementById('mealMemoList').innerHTML = memos.length
    ? memos.map((m,i)=>`<div class="memo-item">
        <div><div class="memo-text">${esc(m.text)}</div><div class="memo-meta">${m.date}</div></div>
        <button class="memo-del" onclick="deleteMemoItem(${i})">🗑</button>
      </div>`).join('')
    : `<div class="no-memo">まだメモはありません</div>`;
}
async function addMemo() {
  const text = document.getElementById('mealMemoInput').value.trim();
  if(!text) return;
  const {dateKey:dk,itemId}=activeMealItem;
  const item=(meals[dk]||[]).find(m=>m.id===itemId); if(!item) return;
  if(!item.memos) item.memos=[];
  const d=new Date(), date=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  item.memos.unshift({text,date,ts:Date.now()});
  await saveMealsData();
  document.getElementById('mealMemoInput').value='';
  renderMemoList(item); renderRecipes();
}
async function deleteMemoItem(idx) {
  const {dateKey:dk,itemId}=activeMealItem;
  const item=(meals[dk]||[]).find(m=>m.id===itemId); if(!item) return;
  item.memos.splice(idx,1);
  await saveMealsData(); renderMemoList(item); renderRecipes();
}

// ═══════════════════════════════════════════
// RECIPE BOOK
// ═══════════════════════════════════════════
function getAllTags(){
  const s=new Set(PRESET_TAGS);
  recipes.forEach(r=>r.tags.forEach(t=>s.add(t)));
  return [...s];
}
function renderTagFilters(){
  const tags=getAllTags();
  document.getElementById('tagFilters').innerHTML =
    `<button class="tag-chip ${activeCategoryFilter===null?'active':''}" onclick="setCategoryFilter(null)">すべて</button>` +
    tags.map(t=>`<button class="tag-chip ${activeCategoryFilter===t?'active':''}" onclick="setCategoryFilter('${esc(t)}')">${esc(t)}</button>`).join('');
}
function setCategoryFilter(t){ activeCategoryFilter=t; renderTagFilters(); renderRecipes(); }
function toggleFavFilter(){ showFavOnly=!showFavOnly; document.getElementById('favToggle').classList.toggle('active',showFavOnly); renderRecipes(); }

function renderRecipes(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered=recipes.filter(r=>{
    const ms=!q||r.ingredients.toLowerCase().includes(q);
    const mt=activeCategoryFilter===null||r.tags.includes(activeCategoryFilter);
    const mf=!showFavOnly||r.favorite;
    return ms&&mt&&mf;
  });
  document.getElementById('recipeCountInfo').textContent=filtered.length+' 件';
  const grid=document.getElementById('recipeGrid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty-state"><div class="icon">🍳</div><p>レシピが見つかりませんでした</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map(r=>{
    const mc=countRecipeMemos(r.id);
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      <div class="card-header">
        <div class="card-title">${esc(r.name)}${r.aiGenerated?'<span class="ai-badge">AI</span>':''}${mc>0?`<span class="memo-badge">📝${mc}</span>`:''}</div>
        <div class="card-tags">${r.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>
        <button class="fav-btn ${r.favorite?'active':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${r.favorite?'♥':'♡'}</button>
      </div>
      <div class="card-body">
        <div class="card-ingredients"><strong>材料</strong>${esc(r.ingredients.replace(/[\n,、]/g,'・').slice(0,55))}${r.ingredients.length>55?'…':''}</div>
        <div class="card-meta">
          <span class="card-date">${r.date}</span>
          <div class="card-actions">
            <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${r.id}')">✏️</button>
            <button class="icon-btn danger" onclick="event.stopPropagation();deleteRecipe('${r.id}')">🗑️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
function countRecipeMemos(recipeId){
  let c=0;
  Object.values(meals).forEach(arr=>arr.forEach(m=>{if(m.recipeId===recipeId&&m.memos)c+=m.memos.length;}));
  return c;
}
function collectRecipeMemos(recipeId){
  const res=[];
  Object.values(meals).forEach(arr=>arr.forEach(m=>{if(m.recipeId===recipeId&&m.memos)m.memos.forEach(mo=>res.push(mo));}));
  return res.sort((a,b)=>b.ts-a.ts);
}

// Recipe CRUD
function openAddModal(){
  editingId=null; selectedTags=[];
  document.getElementById('formTitle').textContent='レシピを追加';
  ['fName','fIngredients','fSteps'].forEach(id=>document.getElementById(id).value='');
  renderPresetTagBtns(); renderSelectedTagList();
  openModal('formModal');
}
function openEditModal(id){
  const r=recipes.find(x=>x.id===id); if(!r) return;
  editingId=id; selectedTags=[...r.tags];
  document.getElementById('formTitle').textContent='レシピを編集';
  document.getElementById('fName').value=r.name;
  document.getElementById('fIngredients').value=r.ingredients;
  document.getElementById('fSteps').value=r.steps||'';
  renderPresetTagBtns(); renderSelectedTagList();
  openModal('formModal');
}
function renderPresetTagBtns(){
  document.getElementById('presetTagsBtns').innerHTML=PRESET_TAGS.map(t=>
    `<button class="preset-tag ${selectedTags.includes(t)?'selected':''}" onclick="togglePresetTag('${t}')">${t}</button>`
  ).join('');
}
function togglePresetTag(tag){ selectedTags.includes(tag)?selectedTags=selectedTags.filter(x=>x!==tag):selectedTags.push(tag); renderPresetTagBtns(); renderSelectedTagList(); }
function addCustomTag(){ const v=document.getElementById('customTagInput').value.trim(); if(!v||selectedTags.includes(v)) return; selectedTags.push(v); document.getElementById('customTagInput').value=''; renderPresetTagBtns(); renderSelectedTagList(); }
function removeTag(tag){ selectedTags=selectedTags.filter(x=>x!==tag); renderPresetTagBtns(); renderSelectedTagList(); }
function renderSelectedTagList(){
  document.getElementById('selectedTagList').innerHTML=selectedTags.filter(t=>!PRESET_TAGS.includes(t)).map(t=>
    `<span class="tag-item">${esc(t)}<button class="tag-remove" onclick="removeTag('${esc(t)}')">×</button></span>`
  ).join('');
}
async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('レシピ名を入力してください');return;}
  const d=new Date(),date=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  if(editingId){
    const r=recipes.find(x=>x.id===editingId);
    Object.assign(r,{name,ingredients:document.getElementById('fIngredients').value,steps:document.getElementById('fSteps').value,tags:[...selectedTags]});
  } else {
    recipes.unshift({id:Date.now().toString(),name,ingredients:document.getElementById('fIngredients').value,steps:document.getElementById('fSteps').value,tags:[...selectedTags],favorite:false,aiGenerated:false,date});
  }
  await saveRecipesData();
  closeModal('formModal'); renderAll();
}
async function toggleFav(id){ const r=recipes.find(x=>x.id===id); if(r){r.favorite=!r.favorite;await saveRecipesData();renderRecipes();} }
async function deleteRecipe(id){
  if(!confirm('このレシピを削除しますか？')) return;
  recipes=recipes.filter(x=>x.id!==id);
  await saveRecipesData(); renderAll();
}
function openDetail(id){
  const r=recipes.find(x=>x.id===id); if(!r) return;
  document.getElementById('detailTitle').textContent=r.name;
  const memos=collectRecipeMemos(id);
  const stepsHtml=r.steps
    ?`<ol class="steps-list">${r.steps.split('\n').filter(s=>s.trim()).map(s=>`<li>${esc(s.replace(/^[①-⑩\d]+[\.、．]?\s*/,''))}</li>`).join('')}</ol>`:'';
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-section">
      <div class="card-tags" style="margin-bottom:12px">${r.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}${r.aiGenerated?'<span class="ai-badge">AI生成</span>':''}</div>
    </div>
    <div class="detail-section"><h3>材料</h3><p>${esc(r.ingredients)}</p></div>
    ${r.steps?`<div class="detail-section"><h3>作り方</h3>${stepsHtml}</div>`:''}
    ${memos.length?`<div class="detail-section"><h3>📝 献立からのメモ</h3><div class="memo-list">${memos.map(m=>`<div class="memo-item"><div><div class="memo-text">${esc(m.text)}</div><div class="memo-meta">${m.date}</div></div></div>`).join('')}</div></div>`:''}
    <div style="font-size:11px;color:var(--text2);text-align:right;margin-top:10px">登録日：${r.date}</div>`;
  document.getElementById('detailEditBtn').onclick=()=>{closeModal('detailModal');openEditModal(id);};
  openModal('detailModal');
}

// ═══════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el=>
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');})
);

loadAll();
</script>
